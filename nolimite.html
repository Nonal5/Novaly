<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nolimite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Inter', sans-serif;
            background-color: #1a1a24; color: white; display: flex;
            flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* --- EN TÊTE --- */
        .header {
            text-align: center; padding: 15px; background: #111; font-weight: 900;
            font-size: 18px; letter-spacing: 2px; text-transform: uppercase;
            border-bottom: 2px solid #8e44ad; flex-shrink: 0;
        }

        /* --- SCORES (EN HAUT DU JEU) --- */
        .scoreboard {
            display: flex; gap: 15px; padding: 10px 15px; background: #15151e;
            overflow-x: auto; border-bottom: 1px solid #333; flex-shrink: 0;
            scrollbar-width: none;
        }
        .scoreboard::-webkit-scrollbar { display: none; }
        
        .player-score-box {
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            min-width: 60px; position: relative; opacity: 0.5; transition: 0.3s;
        }
        .player-score-box.active { opacity: 1; }
        .player-score-box.master .avatar { border-color: #f1c40f; box-shadow: 0 0 10px #f1c40f; }
        .master-crown { position: absolute; top: -10px; font-size: 16px; }

        .avatar {
            width: 45px; height: 45px; border-radius: 50%; border: 2px solid #555;
            background-size: cover; background-position: center; background-color: #333;
            background-repeat: no-repeat; flex-shrink: 0;
        }
        
        .player-name { font-size: 10px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60px; }
        .player-points { background: #8e44ad; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: 900; }

        /* --- ZONES GLOBALES --- */
        .container { flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .game-board { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; }

        /* --- SALON (LOBBY & SETUP) --- */
        .setup-screen { display: flex; flex-direction: column; align-items: center; padding: 30px 20px; text-align: center; }
        .form-group { width: 100%; max-width: 320px; margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
        .form-group input[type="text"] { width: 100%; box-sizing: border-box; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #000; color: white; font-family: inherit; }
        
        .file-input-wrapper { background: #222; border: 1px dashed #8e44ad; border-radius: 8px; padding: 15px; text-align: center; cursor: pointer; color: #ccc; font-size: 13px; position: relative;}
        .file-input-wrapper input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        
        /* Slider pour le recadrage/zoom */
        input[type="range"] { width: 100%; accent-color: #8e44ad; margin-top: 10px; }

        .toggle-switch { display: flex; align-items: center; gap: 10px; background: #111; padding: 15px; border-radius: 8px; border: 1px solid #333; margin-bottom: 20px; width: 100%; max-width: 320px; box-sizing: border-box;}
        .toggle-switch input { width: 20px; height: 20px; accent-color: #8e44ad; }

        .btn-primary { background: #8e44ad; color: white; border: none; padding: 15px; width: 100%; max-width: 320px; font-size: 16px; font-weight: 900; border-radius: 8px; cursor: pointer; text-transform: uppercase; transition: 0.2s;}
        .btn-primary:hover { background: #9b59b6; }
        .btn-primary:disabled { background: #444 !important; color: #888 !important; cursor: not-allowed; }

        /* --- SALON D'ATTENTE --- */
        .waiting-player { display: flex; flex-direction: column; align-items: center; gap: 8px; background: #111; padding: 15px; border-radius: 8px; border: 1px solid #333; width: 80px; animation: fadeIn 0.3s ease;}

        /* --- CARTES --- */
        .black-card {
            background-color: #000; color: #fff; width: 100%; max-width: 320px; min-height: 160px;
            padding: 20px; border-radius: 12px; box-sizing: border-box; font-size: 20px; font-weight: 700;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8); border: 1px solid #333; margin-bottom: 15px;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .player-hand { width: 100%; display: flex; gap: 15px; overflow-x: auto; padding: 20px; box-sizing: border-box; background: #111; border-top: 1px solid #333; flex-shrink: 0; }
        
        .white-card {
            background-color: #fff; color: #000; min-width: 130px; max-width: 130px; height: 180px;
            padding: 15px; border-radius: 8px; font-size: 13px; font-weight: 700; box-sizing: border-box;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: 0.2s; flex-shrink: 0;
            display: flex; flex-direction: column; justify-content: space-between; position: relative;
        }
        .white-card:hover { transform: translateY(-5px); }
        .white-card.selected { border: 4px solid #8e44ad; transform: translateY(-10px); }

        .custom-card { border: 2px dashed #8e44ad; background-color: #fdfdfd; }
        .custom-card textarea {
            width: 100%; height: 100%; border: none; background: transparent; resize: none;
            font-family: inherit; font-size: 13px; font-weight: 700; outline: none; padding: 0; margin: 0;
        }

        .submitted-cards-container { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 400px;}
        .card-secret { background: #222; color: #222; border: 1px solid #444; background-image: repeating-linear-gradient(45deg, #2a2a2a 25%, transparent 25%, transparent 75%, #2a2a2a 75%, #2a2a2a), repeating-linear-gradient(45deg, #2a2a2a 25%, #222 25%, #222 75%, #2a2a2a 75%, #2a2a2a); background-position: 0 0, 10px 10px; background-size: 20px 20px; }
        .card-secret::after { content: '?'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #555; font-size: 40px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .dev-controls { position: fixed; bottom: 5px; right: 5px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; z-index: 9999; font-size: 10px;}
        .dev-controls button { background: #333; color: white; border: 1px solid #555; padding: 5px; margin: 2px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">Nolimite</div>

    <div id="setup-screen" class="container setup-screen">
        <h2 style="margin-top: 0;">Votre Profil</h2>
        
        <div id="avatar-preview" class="avatar" style="width: 80px; height: 80px; margin-bottom: 5px; font-size: 32px; font-weight: bold; background-color: #333; background-size: 100%;">?</div>
        
        <div id="zoom-container" style="display: none; width: 100%; max-width: 200px; margin-bottom: 20px; text-align: center;">
            <label style="font-size: 10px; color: #888;">Recadrer / Zoomer</label>
            <input type="range" id="avatar-zoom" min="100" max="300" value="100" oninput="updateZoom(this.value)">
        </div>

        <div class="form-group" style="margin-top: 15px;">
            <label>Votre Pseudo</label>
            <input type="text" id="input-pseudo" placeholder="Ex: Xx_Gamer_xX" maxlength="15">
        </div>

        <div class="form-group">
            <label>Photo de profil</label>
            <div class="file-input-wrapper">
                📷 Prendre une photo / Galerie
                <input type="file" accept="image/*" id="input-file" onchange="previewAvatar(event)">
            </div>
            <p style="text-align: center; margin: 10px 0; font-size: 11px; color: #666;">- OU -</p>
            <input type="text" id="input-url" placeholder="Coller une URL d'image..." oninput="previewAvatarUrl(this.value)">
        </div>

        <div class="toggle-switch">
            <input type="checkbox" id="input-custom-card" checked>
            <div style="text-align: left;">
                <span style="font-size: 14px; font-weight: bold;">Option Carte Blanche</span>
                <p style="font-size: 10px; color: #888; margin: 2px 0 0 0;">Recevez une carte vide à écrire à chaque tour.</p>
            </div>
        </div>

        <button class="btn-primary" onclick="rejoindreSalon()">Rejoindre le salon</button>
    </div>

    <div id="waiting-room-screen" class="container setup-screen" style="display: none;">
        <h2 style="margin-top: 0;">Salon Privé</h2>
        <p style="color: #aaa; font-size: 13px;">Code de la salle : <strong style="color: white; letter-spacing: 2px; font-size: 16px;">X49B</strong></p>
        
        <p id="player-count" style="color: #8e44ad; font-weight: bold; font-size: 18px; margin-top: 20px;">1 / 8 Joueurs</p>
        
        <div id="waiting-players-list" style="display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin: 20px 0; width: 100%;">
            </div>

        <button id="btn-start-game" class="btn-primary" disabled onclick="demarrerLaPartie()">En attente de joueurs...</button>
    </div>

    <div id="game-screen" class="container" style="display: none;">
        <div class="scoreboard" id="scoreboard">
            </div>

        <div class="game-board">
            <div id="game-status" style="font-size: 12px; color: #f1c40f; font-weight: bold; margin-bottom: 10px; text-transform: uppercase;">C'est à vous de jouer</div>
            
            <div class="black-card" id="question-card">
                Chargement de la question...
            </div>

            <button class="btn-primary" id="confirm-btn" style="display: none; border-radius: 30px; margin-top: 10px; max-width: 250px;" onclick="validerCarte()">Confirmer mon choix</button>
            
            <div id="judge-area" class="submitted-cards-container" style="display: none;">
                </div>
        </div>

        <div class="player-hand" id="hand-area">
            </div>
    </div>

    <div class="dev-controls" id="dev-controls" style="display: none;">
        <b>Outils de Dev :</b><br>
        <button onclick="setRole('joueur')">Simuler Joueur</button>
        <button onclick="setRole('maitre')">Simuler Juge</button>
    </div>

    <script>
        // --- DONNÉES ---
        let monPseudo = "Anonyme";
        let monAvatar = "";
        let monZoom = 100;
        let optionCarteBlanche = false;
        
        let joueursSalon = [];
        let indexMaitreActuel = 0; // Garde en mémoire quel joueur est le juge du tour

        let roleActuel = 'joueur'; 
        let carteSelectionnee = null;
        let texteCarteBlanche = "";

        let listePhrases = [];
        let listeMots = [];

        // ================= GESTION DU RECADRAGE / ZOOM =================
        function previewAvatar(event) {
            const file = event.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                appliquerAvatar(url);
            }
        }

        function previewAvatarUrl(url) {
            if(url.length > 5) appliquerAvatar(url);
        }

        function appliquerAvatar(url) {
            monAvatar = url;
            const preview = document.getElementById('avatar-preview');
            preview.style.backgroundImage = `url(${url})`;
            preview.innerText = "";
            document.getElementById('zoom-container').style.display = 'block';
        }

        function updateZoom(val) {
            monZoom = val;
            document.getElementById('avatar-preview').style.backgroundSize = val + '%';
        }

        // ================= REJOINDRE LE SALON D'ATTENTE =================
        function rejoindreSalon() {
            const inputPseudo = document.getElementById('input-pseudo').value.trim();
            if(inputPseudo) monPseudo = inputPseudo;
            optionCarteBlanche = document.getElementById('input-custom-card').checked;

            joueursSalon = [{
                id: 1, 
                pseudo: monPseudo, 
                avatar: monAvatar, 
                zoom: monZoom,
                score: 0, 
                isMaster: false, 
                isMe: true 
            }];

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('waiting-room-screen').style.display = 'flex';
            
            majAffichageSalon();
            simulerArriveeJoueurs();
        }

        function majAffichageSalon() {
            const listEl = document.getElementById('waiting-players-list');
            listEl.innerHTML = '';

            joueursSalon.forEach(j => {
                const styleAvatar = j.avatar ? `background-image: url(${j.avatar}); background-size: ${j.zoom || 100}%; font-size:0;` : '';
                const initial = j.pseudo.charAt(0).toUpperCase();
                
                listEl.innerHTML += `
                    <div class="waiting-player">
                        <div class="avatar" style="${styleAvatar}">${j.avatar ? '' : initial}</div>
                        <div style="font-size: 12px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; max-width: 100%;">${j.pseudo}</div>
                    </div>
                `;
            });

            document.getElementById('player-count').innerText = `${joueursSalon.length} / 8 Joueurs`;

            const btnStart = document.getElementById('btn-start-game');
            if (joueursSalon.length >= 2) {
                btnStart.disabled = false;
                btnStart.innerText = "Lancer la partie";
                btnStart.style.background = "#8e44ad";
                btnStart.style.color = "white";
                btnStart.style.cursor = "pointer";
            }
        }

        function simulerArriveeJoueurs() {
            setTimeout(() => {
                joueursSalon.push({ id: 2, pseudo: "Léa_Gaming", avatar: "https://i.pravatar.cc/100?img=5", zoom: 100, score: 0, isMaster: false, isMe: false });
                majAffichageSalon();
            }, 2000);

            setTimeout(() => {
                joueursSalon.push({ id: 3, pseudo: "NoobMaster", avatar: "https://i.pravatar.cc/100?img=11", zoom: 100, score: 0, isMaster: false, isMe: false });
                majAffichageSalon();
            }, 4000);
        }

        function demarrerLaPartie() {
            document.getElementById('waiting-room-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('dev-controls').style.display = 'block';

            // Premier Maître du Jeu tiré au sort au début du jeu
            indexMaitreActuel = Math.floor(Math.random() * joueursSalon.length);
            joueursSalon[indexMaitreActuel].isMaster = true;

            roleActuel = joueursSalon[indexMaitreActuel].isMe ? 'maitre' : 'joueur';

            chargerFichiers();
        }

        // ================= CHARGEMENT ET LOGIQUE =================
        async function chargerFichiers() {
            try {
                const [propRes, wordRes] = await Promise.all([
                    fetch('nolimite-prop.txt'), fetch('nolimite-word.txt')
                ]);

                if (!propRes.ok || !wordRes.ok) throw new Error("Fichiers introuvables.");

                listePhrases = (await propRes.text()).split('\n').map(l => l.trim()).filter(l => l.length > 0);
                listeMots = (await wordRes.text()).split('\n').map(l => l.trim()).filter(l => l.length > 0);
                nouvelleManche();
            } catch (err) {
                console.warn("Fichiers .txt absents, utilisation des données de secours.");
                listePhrases = ["Mon dernier rencard s'est mal passé à cause de _________.", "À Noël, ma grand-mère m'a offert _________.", "Le secret d'un bon mariage, c'est _________."];
                listeMots = ["Une attaque de pigeons.", "Des chaussettes trouées.", "Dire la vérité.", "Un vieux kebab.", "Ma collection de cailloux.", "Faire le mort.", "Un poney chauve."];
                nouvelleManche();
            }
        }

        function nouvelleManche() {
            majScoreboard();

            // Tirer une nouvelle question au hasard
            const phrase = listePhrases[Math.floor(Math.random() * listePhrases.length)];
            document.getElementById('question-card').innerHTML = `<div>${phrase}</div><div style="font-size: 11px; color: #8e44ad; margin-top: 20px;">Nolimite</div>`;

            if (roleActuel === 'joueur') preparerMainJoueur();
            else if (roleActuel === 'maitre') preparerVueMaitre();
        }

        function majScoreboard() {
            const sb = document.getElementById('scoreboard');
            sb.innerHTML = '';
            
            joueursSalon.forEach(j => {
                const couronne = j.isMaster ? '<div class="master-crown">👑</div>' : '';
                const styleAvatar = j.avatar ? `background-image: url(${j.avatar}); background-size: ${j.zoom || 100}%; font-size:0;` : '';
                const initial = j.pseudo.charAt(0).toUpperCase();

                sb.innerHTML += `
                    <div class="player-score-box ${j.isMaster ? 'master active' : 'active'}">
                        ${couronne}
                        <div class="avatar" style="${styleAvatar}">${j.avatar ? '' : initial}</div>
                        <div class="player-name">${j.pseudo}</div>
                        <div class="player-points">${j.score} pts</div>
                    </div>
                `;
            });
        }

        // --- ROLE : JOUEUR ---
        function preparerMainJoueur() {
            document.getElementById('game-status').innerText = "Choisissez votre carte";
            document.getElementById('game-status').style.color = "#4cd137";
            document.getElementById('hand-area').style.display = 'flex';
            document.getElementById('judge-area').style.display = 'none';
            document.getElementById('confirm-btn').style.display = 'none';
            carteSelectionnee = null;

            const main = document.getElementById('hand-area');
            main.innerHTML = '';

            // 5 CARTES AU HASARD MAXIMUM
            // Si l'option carte blanche est active, on met 1 carte blanche + 4 mots tirés au sort
            if (optionCarteBlanche) {
                const blankCard = document.createElement('div');
                blankCard.className = 'white-card custom-card';
                blankCard.innerHTML = `<textarea placeholder="Écrivez votre réponse ici..." oninput="updateTexteCustom(this.value)"></textarea>`;
                blankCard.onclick = () => selectionnerCarte(blankCard, "CUSTOM");
                main.appendChild(blankCard);
            }

            const nbCartesATirer = optionCarteBlanche ? 4 : 5;
            const motsTires = [...listeMots].sort(() => 0.5 - Math.random()).slice(0, nbCartesATirer);

            motsTires.forEach(texte => {
                const card = document.createElement('div');
                card.className = 'white-card';
                card.innerHTML = `<div>${texte}</div><div style="font-size: 10px; color: #ccc;">Nolimite</div>`;
                card.onclick = () => selectionnerCarte(card, text = texte);
                main.appendChild(card);
            });
        }

        function updateTexteCustom(val) { texteCarteBlanche = val; }

        function selectionnerCarte(cardEl, texte) {
            document.querySelectorAll('.white-card').forEach(c => c.classList.remove('selected'));
            cardEl.classList.add('selected');
            carteSelectionnee = texte;
            document.getElementById('confirm-btn').style.display = 'block';
        }

        function validerCarte() {
            let reponseFinale = carteSelectionnee;
            if (carteSelectionnee === "CUSTOM") {
                if(texteCarteBlanche.trim() === "") { alert("Votre carte blanche est vide !"); return; }
                reponseFinale = texteCarteBlanche;
            }

            alert("Vous avez envoyé : " + reponseFinale);
            
            document.getElementById('hand-area').innerHTML = `<p style="color:#888; text-align:center; width:100%;">Carte envoyée. Attente du Maître du jeu...</p>`;
            document.getElementById('confirm-btn').style.display = 'none';
            document.getElementById('game-status').innerText = "Le Maître du Jeu lit les cartes...";
            document.getElementById('game-status').style.color = "#f1c40f";
        }

        // --- ROLE : MAITRE DU JEU ---
        function preparerVueMaitre() {
            document.getElementById('game-status').innerText = "En attente des propositions...";
            document.getElementById('game-status').style.color = "#e74c3c";
            document.getElementById('hand-area').style.display = 'none';
            document.getElementById('confirm-btn').style.display = 'none';
            
            const judgeArea = document.getElementById('judge-area');
            judgeArea.style.display = 'flex';
            judgeArea.innerHTML = '';

            setTimeout(() => {
                document.getElementById('game-status').innerText = "Sélectionnez la meilleure carte !";
                document.getElementById('game-status').style.color = "#4cd137";
                
                // Simuler les cartes reçues par les autres joueurs (Chacun en envoie 1 au hasard depuis sa main)
                const nbCartesRecues = joueursSalon.length - 1;
                const propositions = [...listeMots].sort(() => 0.5 - Math.random()).slice(0, nbCartesRecues);
                
                propositions.forEach((texte) => {
                    const card = document.createElement('div');
                    card.className = 'white-card card-secret'; 
                    
                    card.onclick = function() {
                        if(this.classList.contains('card-secret')) {
                            // Retourner la carte
                            this.classList.remove('card-secret');
                            this.innerHTML = `<div>${texte}</div><div style="font-size: 10px; color: #ccc;">Nolimite</div>`;
                        } else {
                            // Désigner le gagnant de la manche
                            document.querySelectorAll('#judge-area .white-card').forEach(c => c.classList.remove('selected'));
                            this.classList.add('selected');
                            
                            setTimeout(() => {
                                alert(`Manche terminée !\nLa carte gagnante est : "${texte}"`);
                                passerALaMancheSuivante();
                            }, 500);
                        }
                    };
                    judgeArea.appendChild(card);
                });
            }, 1500);
        }

        // ================= PASSAGE AUTOMATIQUE DE MANCHE =================
        function passerALaMancheSuivante() {
            // 1. Donner 1 point au gagnant simulé (On donne au joueur 1 ou 2 au hasard pour l'exemple)
            let indexGagnant = Math.floor(Math.random() * joueursSalon.length);
            joueursSalon[indexGagnant].score += 1;
            alert(`${joueursSalon[indexGagnant].pseudo} gagne 1 point !`);

            // 2. Changer de Maître du jeu (On passe au joueur suivant dans la liste)
            joueursSalon[indexMaitreActuel].isMaster = false;
            indexMaitreActuel = (indexMaitreActuel + 1) % joueursSalon.length;
            joueursSalon[indexMaitreActuel].isMaster = true;

            // 3. Mettre à jour mon rôle pour la nouvelle manche
            roleActuel = joueursSalon[indexMaitreActuel].isMe ? 'maitre' : 'joueur';

            // 4. Lancer la nouvelle manche (Tout va se re-tirer au sort)
            nouvelleManche();
        }

        // --- OUTILS DE TEST ---
        function setRole(nouveauRole) {
            roleActuel = nouveauRole;
            joueursSalon.forEach(j => j.isMaster = false);
            if (roleActuel === 'maitre') {
                indexMaitreActuel = 0;
                joueursSalon[0].isMaster = true; // Moi
            } else {
                indexMaitreActuel = 1;
                if(joueursSalon.length > 1) joueursSalon[1].isMaster = true; // Léa
            }
            nouvelleManche();
        }
    </script>
</body>
</html>
