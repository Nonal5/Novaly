<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - NOVA</title>
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #121212 0%, #1a1a24 100%);
            color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: #18181c;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 350px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .logo { font-size: 32px; font-weight: 800; margin-bottom: 30px; letter-spacing: 2px; }
        
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; color: #a0a0a0; font-size: 14px; }
        .form-group input {
            width: 90%; padding: 12px; background: #222; border: 1px solid #444;
            color: white; border-radius: 6px; outline: none; transition: border 0.2s;
        }
        .form-group input:focus { border-color: #ffffff; }

        .btn {
            background-color: #ffffff; color: black; border: none; padding: 12px;
            width: 100%; font-size: 16px; font-weight: bold; border-radius: 6px;
            cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.2s;
        }
        .btn:hover { background-color: #d0d0d0; }
        
        .back-link { display: block; margin-top: 20px; color: #a0a0a0; text-decoration: none; font-size: 14px; }
        .back-link:hover { color: #fff; }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo">NOVA</div>
        <h2>Bon retour</h2>
        
        <div class="form-group">
            <label>Nom d'utilisateur</label>
            <input type="text" id="login-username" placeholder="Entrez votre pseudo" onkeypress="handleEnter(event)">
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" placeholder="••••••••" onkeypress="handleEnter(event)">
        </div>
        
        <button class="btn" onclick="login()">Se connecter</button>
        <a href="index.html#magasin" class="back-link">Retour au magasin</a>
    </div>

    <script>
        function login() {
            let inputName = document.getElementById('login-username').value;
            
            // On sauvegarde les infos dans le navigateur (localStorage)
            localStorage.setItem('isLoggedIn', 'true');
            if(inputName.trim() !== "") {
                localStorage.setItem('username', inputName);
            }

            // On redirige vers la bibliothèque du launcher
            window.location.href = 'index.html#bibliotheque';
        }

        // Permet de se connecter en appuyant sur la touche "Entrée"
        function handleEnter(event) {
            if (event.key === "Enter") { login(); }
        }
    </script>

</body>
</html>
