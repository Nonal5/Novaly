<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Imposteur</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            text-align: center;
            padding: 15px;
            background: #1a252f;
            font-weight: 900;
            font-size: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 2px solid #e74c3c;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .timer {
            font-size: 16px;
            color: #e74c3c;
            font-weight: bold;
            background: rgba(231, 76, 60, 0.2);
            padding: 4px 10px;
            border-radius: 4px;
        }

        .game-board {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        /* La carte de rôle à révéler */
        .role-card {
            background: #34495e;
            width: 100%;
            max-width: 320px;
            height: 250px;
            border-radius: 12px;
            padding: 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px dashed #7f8c8d;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .role-card:active {
            transform: scale(0.95);
        }

        .role-hidden {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #bdc3c7;
        }

        .role-revealed {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .role-title {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .impostor-text { color: #e74c3c; }
        .innocent-text { color: #3498db; }

        .location-info {
            font-size: 16px;
            color: #ecf0f1;
            font-weight: 700;
            background: #1a252f;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #2c3e50;
        }

        /* Liste des lieux (pour aider à deviner) */
        .location-list-container {
            width: 100%;
            background: #1a252f;
            height: 35vh;
            display: flex;
            flex-direction: column;
            border-top: 1px solid #34495e;
        }

        .list-header {
            padding: 10px 20px;
            font-size: 11px;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            background: #141d26;
        }

        .locations {
            overflow-y: auto;
            padding: 0 20px;
        }

        .location-item {
            padding: 15px 0;
            border-bottom: 1px solid #2c3e50;
            font-size: 15px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: color 0.2s;
        }

        .location-item:last-child {
            border-bottom: none;
        }

        .location-item.strike {
            text-decoration: line-through;
            color: #7f8c8d;
            opacity: 0.5;
        }

    </style>
</head>
<body>

    <div class="header">
        <span>Imposteur</span>
        <div class="timer">05:00</div>
    </div>

    <div class="game-board">
        <p style="font-size: 13px; color: #bdc3c7; margin-bottom: 20px;">Maintenez enfoncé pour voir votre rôle discrètement</p>
        
        <div class="role-card" id="card" onmousedown="showRole()" onmouseup="hideRole()" ontouchstart="showRole()" ontouchend="hideRole()">
            
            <!-- État caché -->
            <div class="role-hidden" id="hidden-state">
                <svg viewBox="0 0 24 24" style="width: 48px; height: 48px; fill: none; stroke: currentColor; stroke-width: 2; margin-bottom: 15px;">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <div style="font-weight: bold; font-size: 18px;">RÉVÉLER</div>
            </div>

            <!-- État révélé -->
            <div class="role-revealed" id="revealed-state">
                <div id="role-name" class="role-title innocent-text">Innocent</div>
                <div class="location-info">Lieu : <span id="secret-location">Base Spatiale</span></div>
            </div>

        </div>
    </div>

    <div class="location-list-container">
        <div class="list-header">Lieux possibles (Cliquez pour rayer)</div>
        <div class="locations" id="locations-list">
            <!-- Rempli par le JS -->
        </div>
    </div>

    <script>
        // Liste des lieux du jeu
        const locations = [
            "Base Spatiale", "Sous-marin", "Hôpital", "Banque", 
            "École", "Restaurant", "Théâtre", "Poste de police", 
            "Casino", "Bateau pirate", "Supermarché", "Train de nuit"
        ];

        // Simulation de l'attribution d'un rôle
        // Dans le vrai jeu, Firebase décidera si le joueur est imposteur ou non
        const isImpostor = Math.random() > 0.7; // 30% de chance d'être imposteur pour le test
        const currentLocation = locations[Math.floor(Math.random() * locations.length)];

        // Initialisation de la carte de rôle
        const roleNameEl = document.getElementById('role-name');
        const secretLocationEl = document.getElementById('secret-location');

        if (isImpostor) {
            roleNameEl.innerText = "IMPOSTEUR";
            roleNameEl.className = "role-title impostor-text";
            secretLocationEl.innerText = "Inconnu";
            secretLocationEl.style.color = "#e74c3c";
        } else {
            roleNameEl.innerText = "AGENT";
            roleNameEl.className = "role-title innocent-text";
            secretLocationEl.innerText = currentLocation;
        }

        // Remplissage de la liste des lieux
        const listEl = document.getElementById('locations-list');
        locations.sort().forEach(loc => {
            const div = document.createElement('div');
            div.className = 'location-item';
            div.innerText = loc;
            // Fonction pour rayer un lieu
            div.onclick = function() {
                this.classList.toggle('strike');
            };
            listEl.appendChild(div);
        });

        // Fonctions pour gérer le clic sur la carte
        function showRole() {
            document.getElementById('hidden-state').style.display = 'none';
            document.getElementById('revealed-state').style.display = 'flex';
            document.getElementById('card').style.borderStyle = 'solid';
        }

        function hideRole() {
            document.getElementById('hidden-state').style.display = 'flex';
            document.getElementById('revealed-state').style.display = 'none';
            document.getElementById('card').style.borderStyle = 'dashed';
        }
    </script>
</body>
</html>
